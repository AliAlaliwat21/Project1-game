<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <script src="./app.js"></script>
    <script src = "./data.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div id = "Container">
        <div id="title-section">
        <h1>Simple BlackJack</h1>
        <p>Get closer to 21 than the dealer without going over. First to five wins the match.</p>
        </div>
        <div id="instructions">
            Press Start Game to deal cards. Press Hit to draw another card. Press Stand to end your turn. The dealer will draw until reaching 17 or higher.
        </div>
        <div id="wins and losses section">
            <div id="Win">
                Player wins</br>
            </div>
            <div id="loss">
                Dealer Wins </br>
            </div>
        </div>
    </div>
</body>
</html>
